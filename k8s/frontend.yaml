apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hooli-heard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/rsuguiura-crwv/hooli-heard-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hooli-heard
  annotations:
    # CoreWeave CKS External Hostname Controller — gives you a public URL
    service.beta.kubernetes.io/external-hostname: hooli-heard
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
